<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}


body{
    background:#f3f3f3;
    padding:40px;
}


h1{
    margin-bottom:25px;
}


#search{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:8px;
    border:1px solid #bbb;
    margin-bottom:25px;
}


.card{
    display:flex;
    gap:20px;

    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;

    padding:20px;
    margin-bottom:20px;

    transition:.15s;
}


.card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,.1);
}


.thumb{
    width:220px;
    height:120px;
    object-fit:cover;
    border-radius:6px;
}


.info{
    display:flex;
    flex-direction:column;
    justify-content:center;
}


.title{
    font-size:38px;
    font-weight:bold;
}


.creator{
    font-size:24px;
    margin-top:5px;
}


.stats{
    color:#666;
    margin-top:10px;
    font-size:18px;
}


.container{
    display:flex;
    gap:30px;
}


.levels{
    flex:1;
}


.players{
    width:300px;
}


.player-card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;

    padding:15px;
    margin-bottom:15px;
}


.player-name{
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
}


.player-name:hover{
    text-decoration:underline;
}


.player-points{
    color:#666;
    margin-top:5px;
}


.popup{

    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.5);

    justify-content:center;
    align-items:center;
}


.popup-content{

    background:#fff;

    width:500px;
    max-width:90%;

    padding:25px;

    border-radius:12px;

    position:relative;

    max-height:80vh;
    overflow:auto;
}


.close{

    position:absolute;

    right:15px;
    top:10px;

    font-size:32px;
    cursor:pointer;

}


#popupLevels .level{

    padding:8px 0;
    border-bottom:1px solid #ddd;

}


#levelVictors .level{

    padding:10px 0;
    border-bottom:1px solid #ddd;

    font-size:20px;

}


</style>

</head>

<p>

<h3 style="margin-top:15px">

const list=document.getElementById("list");


function render(search=""){

    list.innerHTML="";

    entries
    .filter(e =>
        e.title.toLowerCase()
        .includes(search.toLowerCase())
    )
    .forEach(e=>{

        list.innerHTML+=`

        <div class="card">

            <a href="${e.showcase}" target="_blank">

                <img class="thumb" src="${e.image}">

            </a>


            <div class="info">


                <div class="title"
                style="cursor:pointer"
                onclick="showLevel('${e.title}')">

                    #${e.rank} - ${e.title}

                </div>


                <div class="creator">

                    published by
                    <b>${e.creator}</b>

                </div>


                <div class="stats">

                    verified by
                    <b>${e.verifier}</b>

                </div>


                <div class="stats">

                    points:
                    <b>${e.points}</b>

                </div>


                <div class="stats">

                    ID:
                    <b>${e.id}</b>

                </div>


            </div>

        </div>

        `;

    });

}

function getRankTitle(points){

    if(points >= 5000) return "👑 Grand Master";
    if(points >= 4200) return "🌟 Legend";
    if(points >= 3500) return "💠 Diamond";
    if(points >= 2800) return "💎 Champion";
    if(points >= 2200) return "🔴 Elite";
    if(points >= 1700) return "🟧 Veteran";
    if(points >= 1200) return "🟨 Expert";
    if(points >= 750) return "🟣 Skilled";
    if(points >= 400) return "🔵 Challenger";
    if(points >= 150) return "🟢 Beginner";

    return "⚪ Newcomer";
}

function renderPlayers(){

    const leaderboard=players

    .map(pl=>({

        name:pl.name,

        points:pl.beaten.reduce((total,level)=>{

            const found=
            entries.find(e=>e.title===level);

            return total+(found?found.points:0);

        },0)

    }))

    .sort((a,b)=>b.points-a.points);



    const el=document.getElementById("playersList");

    el.innerHTML="";



    leaderboard.forEach((p,i)=>{


        el.innerHTML+=`

        <div class="player-card">


            <div class="player-name"
            onclick="showPlayer('${p.name}')">

                #${i+1} - ${p.name}

            </div>

<div class="player-points">

    Points:
    <b>${p.points}</b>

</div>


        </div>

        `;


    });


}




function showPlayer(name){


    closeLevelPopup();



    const p=
    players.find(x=>x.name===name);



    let total=0;

    let hardest=null;



    const levels=
    document.getElementById("popupLevels");


    levels.innerHTML="";



    p.beaten.forEach(levelName=>{


        const e=
        entries.find(x=>x.title===levelName);



        if(e){


            total+=e.points;



            if(!hardest || e.rank<hardest.rank)
                hardest=e;



            levels.innerHTML+=`

            <div class="level">


                <span class="player-name"
                style="font-size:18px;"
                onclick="
                closePopup();
                showLevel('${e.title}')
                ">

                    #${e.rank} - ${e.title}

                </span>


                (${e.points} pts)


            </div>

            `;

        }


    });



    document.getElementById("popupName")
    .textContent=p.name;


    document.getElementById("popupPoints")
    .textContent=total;

    document.getElementById("popupRank")
    .textContent=getRankTitle(total);

    document.getElementById("popupHardest")
    .textContent=
    hardest
    ? `${hardest.title} (#${hardest.rank})`
    : "None";



    document.getElementById("playerPopup")
    .style.display="flex";

}



function closePopup(){

    document.getElementById("playerPopup")
    .style.display="none";

}



function showLevel(title){


    const e=
    entries.find(x=>x.title===title);



    document.getElementById("levelThumb")
    .src=e.image;



    document.getElementById("levelTitle")
    .textContent=
    `#${e.rank} - ${e.title}`;



    document.getElementById("levelCreator")
    .textContent=e.creator;



    document.getElementById("levelVerifier")
    .textContent=e.verifier;



    document.getElementById("levelPoints")
    .textContent=e.points;



    document.getElementById("levelID")
    .textContent=e.id;



    document.getElementById("levelShowcase")
    .href=e.showcase;



    const victors=
    document.getElementById("levelVictors");



    victors.innerHTML="";



    if(!e.victors || e.victors.length===0){


        victors.innerHTML=
        "<div class='level'>No victors yet.</div>";


    }

    else{


        e.victors.forEach((name,index)=>{


            let medal;


            if(index===0)
                medal="🥇";

            else if(index===1)
                medal="🥈";

            else if(index===2)
                medal="🥉";

            else
                medal="#"+(index+1);



            victors.innerHTML+=`

            <div class="level">


                <b>${medal}</b>


                <span class="player-name"
                onclick="
                closeLevelPopup();
                showPlayer('${name}')
                ">

                    ${name}

                </span>


            </div>

            `;


        });


    }



    document.getElementById("levelPopup")
    .style.display="flex";

}



function closeLevelPopup(){

    document.getElementById("levelPopup")
    .style.display="none";

}



document.getElementById("playerPopup").onclick=e=>{

    if(e.target.id==="playerPopup")
        closePopup();

};



document.getElementById("levelPopup").onclick=e=>{

    if(e.target.id==="levelPopup")
        closeLevelPopup();

};



document.getElementById("search")
.addEventListener("input",e=>{

    render(e.target.value);

});



render();
renderPlayers();
